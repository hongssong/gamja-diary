<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>감자일기</title>
<style>
  @font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansLight.woff') format('woff');
    font-weight: 300;
  }
  @font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
    font-weight: 500;
  }
  @font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
    font-weight: 700;
  }

  :root {
    --potato-brown: #C8926A;
    --potato-dark: #A0714F;
    --potato-light: #E8C9A8;
    --potato-cream: #FDF6EE;
    --potato-warm: #F5ECD8;
    --bg: #FDF6EE;
    --card: #FFFAF4;
    --text: #4A3728;
    --text-sub: #8B6E5A;
    --border: #E8D5C0;
    --accent: #D4845A;
    --shadow: 0 4px 20px rgba(160,113,79,0.12);
  }

  html { overscroll-behavior: none; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'GmarketSans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0;
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
  }

  .app {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background: var(--card);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(160deg, #F5E6D0 0%, #EDD5B0 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    flex-direction: column;
  }

  .header-date {
    font-size: 11px;
    color: var(--text-sub);
    letter-spacing: 0.05em;
    margin-bottom: 2px;
  }

  .header-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--potato-dark);
  }

  /* 햄버거 버튼 */
  .hamburger-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    border-radius: 10px;
    transition: background 0.2s;
  }
  .hamburger-btn:hover { background: rgba(160,113,79,0.1); }
  .hamburger-btn span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--potato-dark);
    border-radius: 2px;
    transition: all 0.3s;
  }

  /* ── 사이드 메뉴 오버레이 ── */
  .menu-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
  }
  .menu-overlay.open { display: block; }

  .side-menu {
    position: fixed;
    top: 0;
    right: -280px;
    width: 280px;
    height: 100vh;
    background: var(--card);
    z-index: 300;
    transition: right 0.3s ease;
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 20px rgba(0,0,0,0.15);
  }
  .side-menu.open { right: 0; }

  .side-menu-header {
    background: linear-gradient(160deg, #F5E6D0 0%, #EDD5B0 100%);
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .side-menu-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--potato-dark);
  }

  .close-btn {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: var(--potato-dark);
    padding: 4px;
  }

  .side-menu-items {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .side-menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 14px;
    background: white;
    border: 1.5px solid var(--border);
    cursor: pointer;
    font-family: 'GmarketSans', sans-serif;
    font-size: 14px;
    color: var(--text);
    transition: all 0.2s;
    text-align: left;
  }
  .side-menu-item:hover {
    border-color: var(--potato-brown);
    background: var(--potato-warm);
  }
  .side-menu-item.active {
    border-color: var(--accent);
    background: linear-gradient(135deg, #FDF0E8, #F8E0CC);
    color: var(--accent);
    font-weight: 700;
  }
  .side-menu-item .menu-icon { font-size: 20px; }

  /* ── 메인 콘텐츠 ── */
  .main-content {
    flex: 1;
    overflow-y: auto;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* ── 감자 섹션 ── */
  .potato-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 20px 12px;
    background: linear-gradient(180deg, #EDD5B0 0%, var(--potato-cream) 100%);
  }

  .potato-wrap {
    position: relative;
    width: 160px;
    height: 150px;
  }

  .potato-svg {
    width: 160px;
    height: 150px;
    filter: drop-shadow(0 6px 16px rgba(160,113,79,0.25));
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .potato-svg:hover { transform: scale(1.06) rotate(-2deg); }

  .potato-bubble {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 18px 18px 18px 4px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    max-width: 260px;
    text-align: center;
    margin-top: 12px;
    box-shadow: 0 2px 10px rgba(160,113,79,0.1);
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }

  .typing-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--potato-brown);
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── 감정 선택 ── */
  .section { padding: 16px 20px; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .emotions {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .emotion-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 4px;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    background: white;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 10px;
    color: var(--text-sub);
    font-family: 'GmarketSans', sans-serif;
  }
  .emotion-btn .emoji { font-size: 22px; line-height: 1; }
  .emotion-btn:hover {
    border-color: var(--potato-brown);
    background: var(--potato-warm);
    transform: translateY(-2px);
  }
  .emotion-btn.active {
    border-color: var(--accent);
    background: linear-gradient(135deg, #FDF0E8, #F8E0CC);
    color: var(--accent);
    font-weight: 700;
    transform: translateY(-3px);
    box-shadow: 0 4px 12px rgba(212,132,90,0.2);
  }

  /* ── 일기 작성 ── */
  .diary-area {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    font-family: 'GmarketSans', sans-serif;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    background: white;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 80px;
  }
  .diary-area:focus { border-color: var(--potato-brown); }
  .diary-area::placeholder { color: #C4A98A; }

  .char-count {
    text-align: right;
    font-size: 11px;
    color: var(--text-sub);
    margin-top: 6px;
  }

  /* ── AI 카드 ── */
  .ai-card {
    margin: 0 20px 16px;
    background: linear-gradient(135deg, #FFF8F0, #FDECD8);
    border: 1px solid #EDD5B0;
    border-radius: 18px;
    padding: 16px 18px;
    display: none;
    animation: fadeUp 0.4s ease;
  }
  .ai-card.show { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ai-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .ai-avatar {
    width: 28px; height: 28px;
    background: var(--potato-brown);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .ai-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--potato-dark);
  }

  .ai-message {
    font-family: 'GmarketSans', sans-serif;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
  }

  /* ── 여행 추천 배너 ── */

  /* 감정별 배너 색상 */
  /* ── 저장 버튼 ── */
  .save-btn {
    margin: 0 20px 20px;
    width: calc(100% - 40px);
    padding: 15px;
    background: linear-gradient(135deg, var(--potato-brown), var(--accent));
    border: none;
    border-radius: 16px;
    color: white;
    font-size: 15px;
    font-family: 'GmarketSans', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 16px rgba(200,146,106,0.35);
    letter-spacing: 0.02em;
  }
  .save-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,146,106,0.45); }
  .save-btn:active { transform: translateY(0); }
  .save-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* ── 지난일기 ── */
  .entries-list { padding: 0 20px 20px; }

  .entry-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: box-shadow 0.2s;
  }
  .entry-card:hover { box-shadow: var(--shadow); }

  .entry-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .entry-emotion {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }

  .entry-time { font-size: 11px; color: var(--text-sub); }

  .entry-text {
    font-family: 'GmarketSans', sans-serif;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 8px;
  }

  .entry-ai {
    background: var(--potato-warm);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-sub);
    border-left: 3px solid var(--potato-brown);
  }

  /* ── 감정통계 ── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 16px 20px;
  }

  .stat-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
  }

  .stat-emoji { font-size: 28px; margin-bottom: 6px; }
  .stat-count { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-sub);
    font-size: 14px;
    line-height: 1.8;
  }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-date" id="today-date"></div>
      <div class="header-title">감자일기</div>
    </div>
    <button class="hamburger-btn" onclick="openMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- 사이드 메뉴 오버레이 -->
  <div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>

  <!-- 사이드 메뉴 -->
  <div class="side-menu" id="side-menu">
    <div class="side-menu-header">
      <div class="side-menu-title">🥔 감자일기 메뉴</div>
      <button class="close-btn" onclick="closeMenu()">✕</button>
    </div>
    <div class="side-menu-items">
      <button class="side-menu-item active" id="menu-write" onclick="switchView('write')">
        <span class="menu-icon">📝</span> 오늘 기록
      </button>
      <button class="side-menu-item" id="menu-history" onclick="switchView('history')">
        <span class="menu-icon">📅</span> 지난 일기
      </button>
      <button class="side-menu-item" id="menu-stats" onclick="switchView('stats')">
        <span class="menu-icon">📊</span> 감정 통계
      </button>
    </div>
  </div>

  <!-- 메인 콘텐츠 -->
  <div class="main-content">

    <!-- Write View -->
    <div class="view active" id="view-write">

      <!-- 감자 캐릭터 -->
      <div class="potato-section">
        <div class="potato-wrap">
          <svg class="potato-svg" viewBox="0 0 160 150" xmlns="http://www.w3.org/2000/svg" id="potato-char">
            <path d="M 78 14 C 52 10, 18 28, 12 58 C 6 84, 18 118, 46 132 C 66 142, 100 140, 122 126 C 146 110, 154 84, 148 60 C 142 36, 116 10, 92 12 Z" fill="#C8926A" stroke="#2A1508" stroke-width="4" stroke-linejoin="round"/>
            <ellipse cx="38" cy="62" rx="8" ry="6" fill="#9B6845" opacity="0.65"/>
            <ellipse cx="98" cy="32" rx="7" ry="5" fill="#9B6845" opacity="0.55"/>
            <ellipse cx="128" cy="58" rx="7.5" ry="5.5" fill="#9B6845" opacity="0.6"/>
            <ellipse cx="30" cy="98" rx="6" ry="4.5" fill="#9B6845" opacity="0.55"/>
            <ellipse cx="110" cy="112" rx="7" ry="5" fill="#9B6845" opacity="0.5"/>
            <ellipse cx="62" cy="118" rx="5.5" ry="4" fill="#DDB990" opacity="0.7"/>
            <ellipse cx="118" cy="88" rx="6" ry="4" fill="#DDB990" opacity="0.6"/>
            <ellipse cx="52" cy="40" rx="5" ry="3.5" fill="#DDB990" opacity="0.65"/>
            <ellipse cx="140" cy="100" rx="5" ry="3.5" fill="#9B6845" opacity="0.45"/>
            <ellipse cx="68" cy="78" rx="16" ry="17" fill="white" stroke="#2A1508" stroke-width="2.5"/>
            <ellipse cx="102" cy="78" rx="16" ry="17" fill="white" stroke="#2A1508" stroke-width="2.5"/>
            <circle cx="70" cy="80" r="8" fill="#140800" id="eye-l"/>
            <circle cx="104" cy="80" r="8" fill="#140800" id="eye-r"/>
            <circle cx="73" cy="76" r="3" fill="white"/>
            <circle cx="107" cy="76" r="3" fill="white"/>
            <path id="potato-mouth" d="M 76 102 Q 85 109 94 102" stroke="#2A1508" stroke-width="3" fill="none" stroke-linecap="round"/>
            <ellipse cx="50" cy="94" rx="10" ry="6.5" fill="#E8957A" opacity="0.35" id="cheek-l"/>
            <ellipse cx="120" cy="94" rx="10" ry="6.5" fill="#E8957A" opacity="0.35" id="cheek-r"/>
          </svg>
        </div>
        <div class="potato-bubble" id="potato-bubble">오늘 하루 어땠어? 🥔</div>
      </div>

      <!-- 감정 선택 -->
      <div class="section">
        <div class="section-label">오늘의 감정</div>
        <div class="emotions" id="emotions">
          <button class="emotion-btn" onclick="selectEmotion('신남','🎉','excited')" data-id="excited">
            <span class="emoji">🎉</span>신남
          </button>
          <button class="emotion-btn" onclick="selectEmotion('행복','😊','happy')" data-id="happy">
            <span class="emoji">😊</span>행복
          </button>
          <button class="emotion-btn" onclick="selectEmotion('평온','😌','calm')" data-id="calm">
            <span class="emoji">😌</span>평온
          </button>
          <button class="emotion-btn" onclick="selectEmotion('슬픔','😢','sad')" data-id="sad">
            <span class="emoji">😢</span>슬픔
          </button>
          <button class="emotion-btn" onclick="selectEmotion('힘듦','😔','tired')" data-id="tired">
            <span class="emoji">😔</span>힘듦
          </button>
        </div>
      </div>

      <!-- 일기 작성 -->
      <div class="section" style="padding-top:0">
        <div class="section-label">오늘 일기</div>
        <textarea class="diary-area" id="diary-text" placeholder="오늘 있었던 일, 느꼈던 감정을 자유롭게 써봐요 ✍️" rows="3" maxlength="300" oninput="updateCharCount()"></textarea>
        <div class="char-count"><span id="char-count">0</span>/300</div>
      </div>

      <!-- AI 위로 카드 -->
      <div class="ai-card" id="ai-card">
        <div class="ai-card-header">
          <div class="ai-avatar">🥔</div>
          <div class="ai-name">감자의 한마디</div>
        </div>
        <div class="ai-message" id="ai-message"></div>
      </div>
        </div>
      </div>

      <!-- 저장 버튼 -->
      <button class="save-btn" id="save-btn" onclick="saveDiary()">
        감자에게 오늘 마음 전하기
      </button>

    </div>

    <!-- History View -->
    <div class="view" id="view-history">
      <div class="section">
        <div class="section-label" style="padding-top:4px">지난 일기</div>
      </div>
      <div class="entries-list" id="entries-list">
        <div class="empty-state">
          <div class="empty-emoji">🥔</div>
          아직 기록된 일기가 없어요.<br>오늘의 감정을 처음 기록해봐요!
        </div>
      </div>
    </div>

    <!-- Stats View -->
    <div class="view" id="view-stats">
      <div class="section">
        <div class="section-label" style="padding-top:4px">감정 통계</div>
      </div>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card" style="grid-column:1/-1">
          <div class="empty-state" style="padding:20px">
            <div class="empty-emoji">📊</div>
            일기를 기록하면<br>감정 통계를 볼 수 있어요!
          </div>
        </div>
      </div>
    </div>

  </div><!-- /main-content -->
</div><!-- /app -->

<script>
const ANTHROPIC_API_URL = "https://gamja-diary.won3942.workers.dev";

let selectedEmotion = null;
let entries = JSON.parse(localStorage.getItem('gamja-entries') || '[]');

const potatoBubbles = {
  excited: [

  ],
  happy: [
    "우와, 오늘 좋은 일이 있었구나! 나도 행복해 😊",
    "행복한 날엔 감자도 같이 웃게 돼 🥔",
    "오늘 하루 참 따뜻했겠다. 그 행복 잘 간직해줘 🌸",
    "좋은 일이 있었구나! 그 기분 오늘 하루 내내 함께하길 💛",
    "행복이 느껴져서 나도 기분이 좋아 🌼"
  ],
  calm: [
    "포근한 하루였군요 😌 그런 날도 정말 소중해요",
    "고요하고 잔잔한 하루... 그런 평화가 참 귀해 🌿",
    "별일 없는 하루도 사실 얼마나 소중한지 몰라 🍃",
    "평온한 날엔 나도 마음이 편안해져 😌",
    "오늘처럼 조용하고 따뜻한 하루가 쌓여서 좋은 삶이 되는 거야 🌙"
  ],
  sad: [
    "속상한 일이 있었구나... 곁에 있을게 💛",
    "많이 힘들었지? 그 마음 다 괜찮아 🤍",
    "슬픈 날엔 울어도 돼. 감자가 여기 있어 🥔",
    "오늘 마음이 무거웠겠다... 수고했어, 정말로 🌧️",
    "그 감정 느끼는 거 잘못된 거 아니야. 충분히 그럴 수 있어 💙"
  ],
  tired: [
    "오늘 정말 수고했어요. 많이 지쳤겠다 😔",
    "오늘 하루도 버텨줘서 고마워 🥔",
    "지친 날엔 푹 쉬는 것도 용기야. 잘 쉬어 🌙",
    "많이 힘들었지? 오늘 하루 진짜 고생했어 💤",
    "몸도 마음도 다 지쳤겠다. 오늘은 그냥 쉬어도 돼 🍵"
  ],
  default: [
    "오늘 하루 어땠어? 🥔",
    "오늘도 수고했어! 어떤 하루였어? 😊",
    "감자가 들어줄게, 오늘 이야기 해줘 🌿",
    "오늘 기분은 어때? 🥔"
  ]
};

function getRandomBubble(id) {
  const list = potatoBubbles[id] || potatoBubbles.default;
  return list[Math.floor(Math.random() * list.length)];
}

function openMenu() {
  document.getElementById('menu-overlay').classList.add('open');
  document.getElementById('side-menu').classList.add('open');
}

function closeMenu() {
  document.getElementById('menu-overlay').classList.remove('open');
  document.getElementById('side-menu').classList.remove('open');
}

function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.side-menu-item').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('menu-' + view).classList.add('active');
  closeMenu();
}

function updateDate() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('today-date').textContent =
    now.getFullYear() + '년 ' + (now.getMonth()+1) + '월 ' + now.getDate() + '일 ' + days[now.getDay()] + '요일';
}

function updateCharCount() {
  document.getElementById('char-count').textContent =
    document.getElementById('diary-text').value.length;
}

function selectEmotion(name, emoji, id) {
  selectedEmotion = { name, emoji, id };
  document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-id="' + id + '"]').classList.add('active');
  updatePotatoExpression(id);
  document.getElementById('potato-bubble').textContent = getRandomBubble(id);
}

const potatoExpressions = {
  excited: { mouth: "M 72 99 Q 85 114 98 99", cheeks: 0.75, eyeOffY: -2 },
  happy:   { mouth: "M 74 100 Q 85 112 96 100", cheeks: 0.6, eyeOffY: -1 },
  calm:    { mouth: "M 76 102 Q 85 109 94 102", cheeks: 0.3, eyeOffY: 0 },
  sad:     { mouth: "M 74 108 Q 85 100 96 108", cheeks: 0.08, eyeOffY: 3 },
  tired:   { mouth: "M 76 107 Q 85 102 94 107", cheeks: 0.05, eyeOffY: 4 },
  default: { mouth: "M 76 102 Q 85 109 94 102", cheeks: 0.35, eyeOffY: 0 }
};

function updatePotatoExpression(id) {
  const expr = potatoExpressions[id] || potatoExpressions.default;
  document.getElementById('potato-mouth').setAttribute('d', expr.mouth);
  document.getElementById('cheek-l').setAttribute('opacity', expr.cheeks);
  document.getElementById('cheek-r').setAttribute('opacity', expr.cheeks);
  document.getElementById('eye-l').setAttribute('cy', 80 + (expr.eyeOffY || 0));
  document.getElementById('eye-r').setAttribute('cy', 80 + (expr.eyeOffY || 0));
}

async function saveDiary() {
  const text = document.getElementById('diary-text').value.trim();
  if (!selectedEmotion) {
    document.getElementById('potato-bubble').textContent = "감정을 먼저 선택해줘! 🥔";
    return;
  }
  if (!text) {
    document.getElementById('potato-bubble').textContent = "오늘 하루를 조금만 써줘봐 ✍️";
    return;
  }

  const btn    = document.getElementById('save-btn');
  const bubble = document.getElementById('potato-bubble');
  const aiCard = document.getElementById('ai-card');

  btn.disabled = true;
  btn.textContent = '감자가 읽는 중...';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  aiCard.classList.remove('show');

  try {
    const response = await fetch(ANTHROPIC_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `당신은 '감자'라는 귀여운 감자 캐릭터예요. 사용자가 쓴 일기 내용을 꼼꼼히 읽고, 그 내용에 딱 맞는 따뜻한 답변을 해주세요.

중요: 반드시 사용자가 실제로 쓴 내용에서 구체적인 부분을 언급하며 공감해주세요. 절대 일반적이고 뻔한 말을 하지 마세요.

답변 구성 (3-4문장):
1. 구체적 공감: 사용자가 쓴 내용 중 핵심 상황이나 감정을 직접 언급
2. 심리적 타당화: 그 감정이 당연하고 자연스럽다는 걸 인정
3. 상황에 딱 맞는 명언이나 글귀: 매번 다르게 사용
4. 감자 비유 마무리: 감자의 특성을 사용자 상황에 맞게 비유

규칙:
- 매번 완전히 다른 명언과 표현을 사용해요
- 감자답게 귀엽고 포근한 말투를 유지해요
- 억지로 긍정적으로 만들지 마세요
- 이모지는 1-2개만 자연스럽게 사용해요`,
        messages: [{
          role: 'user',
          content: '오늘의 감정: ' + selectedEmotion.emoji + ' ' + selectedEmotion.name + '\n\n일기 내용: ' + text
        }]
      })
    });

    const data = await response.json();
    const fallbacks = [
      '오늘 하루도 수고했어요 🥔',
      '감자가 다 읽었어. 오늘도 잘했어 💛',
      '오늘 마음 나눠줘서 고마워요 🌿',
      '감자가 꼭 안아줄게요 🥔'
    ];
    const aiText = data.content?.map(c => c.text || '').join('') ||
      fallbacks[Math.floor(Math.random() * fallbacks.length)];

    document.getElementById('ai-message').textContent = aiText;
    aiCard.classList.add('show');

    const afterMessages = [
      "다 읽었어요. 오늘도 잘 버텼어 🥔",
      "감자가 다 들었어. 고마워요 💛",
      "오늘 마음 나눠줘서 고마워 🌿",
      "감자가 꼭 기억할게요 ✨",
      "오늘도 잘했어, 정말로 🥔"
    ];
    bubble.textContent = afterMessages[Math.floor(Math.random() * afterMessages.length)];

    const entry = {
      id: Date.now(),
      date: new Date().toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
      emotion: selectedEmotion,
      text,
      aiResponse: aiText
    };
    entries.unshift(entry);
    if (entries.length > 50) entries = entries.slice(0, 50);
    localStorage.setItem('gamja-entries', JSON.stringify(entries));

    btn.textContent = '저장됐어요 ✓';
    setTimeout(() => {
      btn.textContent = '↩ 처음으로';
      btn.style.background = 'linear-gradient(135deg, #8B6E5A, #A0714F)';
      btn.onclick = resetDiary;
      btn.disabled = false;
    }, 2000);

    renderHistory();
    renderStats();

  } catch (err) {
    bubble.textContent = "앗, 연결이 안 됐어... 다시 시도해봐요 😔";
    btn.textContent = '감자에게 오늘 마음 전하기';
    btn.disabled = false;
  }
}

function resetDiary() {
  document.getElementById('diary-text').value = '';
  document.getElementById('char-count').textContent = '0';
  selectedEmotion = null;
  document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('active'));
  updatePotatoExpression('default');
  document.getElementById('potato-bubble').textContent = getRandomBubble('default');
  document.getElementById('ai-card').classList.remove('show');
  const btn = document.getElementById('save-btn');
  btn.textContent = '감자에게 오늘 마음 전하기';
  btn.style.background = '';
  btn.onclick = saveDiary;
  btn.disabled = false;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderHistory() {
  const list = document.getElementById('entries-list');
  if (!entries.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-emoji">🥔</div>아직 기록된 일기가 없어요.<br>오늘의 감정을 처음 기록해봐요!</div>';
    return;
  }
  list.innerHTML = entries.map(e => `
    <div class="entry-card">
      <div class="entry-top">
        <div class="entry-emotion">${e.emotion.emoji} ${e.emotion.name}</div>
        <div class="entry-time">${e.date}</div>
      </div>
      <div class="entry-text">${e.text}</div>
      ${e.aiResponse ? `<div class="entry-ai">🥔 ${e.aiResponse}</div>` : ''}
    </div>
  `).join('');
}

function renderStats() {
  if (!entries.length) return;
  const counts = {};
  entries.forEach(e => {
    const key = e.emotion.name;
    if (!counts[key]) counts[key] = { emoji: e.emotion.emoji, count: 0 };
    counts[key].count++;
  });
  const sorted = Object.entries(counts).sort((a,b) => b[1].count - a[1].count);
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = `
    <div class="stat-card" style="grid-column:1/-1; display:flex; align-items:center; gap:12px; padding:16px">
      <div style="font-size:36px">${sorted[0][1].emoji}</div>
      <div>
        <div style="font-size:12px; color:var(--text-sub); margin-bottom:2px">가장 많이 느낀 감정</div>
        <div style="font-size:18px; font-weight:700; color:var(--accent)">${sorted[0][0]}</div>
        <div style="font-size:11px; color:var(--text-sub)">총 ${entries.length}개의 일기</div>
      </div>
    </div>
    ${sorted.map(([name, data]) => `
      <div class="stat-card">
        <div class="stat-emoji">${data.emoji}</div>
        <div class="stat-count">${data.count}</div>
        <div class="stat-label">${name}</div>
      </div>
    `).join('')}
  `;
}

updateDate();
renderHistory();
renderStats();
</script>
</body>
</html>
