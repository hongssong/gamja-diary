<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘부터 나는 감자다 🥔</title>
<style>
  @font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
    font-weight: 500;
  }
  @font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
    font-weight: 700;
  }
  :root {
    --brown: #A0714F;
    --brown-lt: #FDF6EE;
    --border: #E8D5C0;
    --accent: #D4845A;
    --text: #4A3728;
    --sub: #8B6E5A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'GmarketSans', sans-serif;
    background: #FDF6EE;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background: #FFFAF4;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: linear-gradient(160deg, #F5E6D0 0%, #EDD5B0 100%);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title { font-size: 18px; font-weight: 700; color: var(--brown); }
  .header-sub { font-size: 11px; color: var(--sub); margin-top: 2px; }
  .back-link {
    text-decoration: none;
    background: white;
    border: 1.5px solid var(--border);
    color: var(--brown);
    font-size: 12px;
    font-weight: 700;
    font-family: GmarketSans, sans-serif;
    padding: 6px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* 스텝 인디케이터 */
  .steps {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    padding: 16px 20px 4px;
  }
  .step-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background .3s;
  }
  .step-dot.active { background: var(--accent); }
  .step-dot.done { background: #C8926A; }

  .content { padding: 16px 20px 40px; flex: 1; }

  .card {
    background: #FFFAF4;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .card-sub {
    font-size: 12px;
    color: var(--sub);
    margin-bottom: 16px;
    line-height: 1.5;
  }

  /* 업로드 */
  .upload-area {
    border: 2px dashed #C8926A;
    border-radius: 14px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    background: #FDF6EE;
    position: relative;
    transition: background .2s;
  }
  .upload-area:hover { background: #f5ead8; }
  .upload-area input {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }

  /* 표정 그리드 */
  .emotion-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .e-chip {
    background: #FDF6EE;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 4px;
    text-align: center;
    cursor: pointer;
    transition: all .15s;
    font-family: GmarketSans, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .e-chip:hover, .e-chip.selected {
    border-color: #C8926A;
    background: #F5ECD8;
    transform: scale(1.03);
  }

  /* 프로그레스 */
  .progress-bar {
    width: 100%; height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 14px;
  }
  .progress-fill {
    height: 4px;
    background: linear-gradient(90deg, #D4845A, #A0714F);
    border-radius: 2px;
    width: 0%;
    transition: width .3s;
  }
  .loading-wrap {
    text-align: center;
    padding: 14px 0 4px;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
  }
  .bouncing {
    display: inline-block;
    animation: bounce .6s ease-in-out infinite alternate;
    font-size: 36px;
  }

  /* 결과 */
  .result-canvas {
    width: 100%;
    max-width: 280px;
    display: block;
    margin: 0 auto 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
  }
  .btn-primary {
    flex: 1;
    padding: 13px;
    background: linear-gradient(135deg, #D4845A, #A0714F);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .btn-secondary {
    padding: 13px 16px;
    background: #fff;
    color: var(--brown);
    border: 1.5px solid #C8926A;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .share-tip {
    background: #F5ECD8;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 11px;
    color: #6B4A2A;
    text-align: center;
    line-height: 1.7;
    margin-top: 12px;
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <div class="header-title">오늘부터 나는 감자다 🥔</div>
      <div class="header-sub">내 사진을 올리면 감자로 변신!</div>
    </div>
    <a href="/" class="back-link">📝 감자일기</a>
  </div>

  <div class="content">

    <!-- 스텝 인디케이터 -->
    <div class="steps">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
    </div>

    <!-- STEP 1: 사진 업로드 -->
    <div class="card" id="step1">
      <div class="card-title">📸 사진 올리기</div>
      <div class="card-sub">얼굴이 잘 보이는 사진을 올려주세요.<br>표정을 감지해서 딱 맞는 감자로 만들어드려요!</div>

      <div class="upload-area" id="upload-area">
        <input type="file" accept="image/*" id="file-input" onchange="handleFile(this)">
        <div style="font-size:36px;margin-bottom:8px">📷</div>
        <div style="font-size:14px;font-weight:700;color:#A0714F;margin-bottom:3px">사진을 올려주세요</div>
        <div style="font-size:11px;color:#8B6E5A">(JPG, PNG, HEIC 모두 가능)</div>
      </div>

      <div style="display:none;text-align:center;margin-top:12px" id="preview-wrap">
        <img id="preview-img" style="width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid #C8926A;display:block;margin:0 auto 8px" src="" alt="">
        <button onclick="retakePhoto()" style="font-size:12px;color:#C8926A;cursor:pointer;text-decoration:underline;background:none;border:none;font-family:inherit">다시 선택할게요</button>
      </div>

      <button id="next-btn" onclick="goStep2()" style="display:none;width:100%;padding:13px;background:linear-gradient(135deg,#D4845A,#A0714F);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:14px">
        이 사진으로 변신하기 🥔
      </button>
    </div>

    <!-- STEP 2: 감정 선택 -->
    <div class="card" id="step2" style="display:none">
      <div class="card-title">😊 감자 표정 고르기</div>
      <div class="card-sub">사진 속 표정과 가장 비슷한 걸 골라주세요!</div>

      <div class="emotion-grid">
        <button class="e-chip" onclick="selectEmotion('happy',this)">
          <span style="font-size:22px">😄</span>
          <span style="font-size:11px;font-weight:700;color:#A0714F">웃음/행복</span>
        </button>
        <button class="e-chip" onclick="selectEmotion('excited',this)">
          <span style="font-size:22px">🙌</span>
          <span style="font-size:11px;font-weight:700;color:#A0714F">만세/신남</span>
        </button>
        <button class="e-chip" onclick="selectEmotion('thumbsup',this)">
          <span style="font-size:22px">👍</span>
          <span style="font-size:11px;font-weight:700;color:#A0714F">엄지척</span>
        </button>
        <button class="e-chip" onclick="selectEmotion('tired',this)">
          <span style="font-size:22px">😪</span>
          <span style="font-size:11px;font-weight:700;color:#A0714F">피곤/졸림</span>
        </button>
        <button class="e-chip" onclick="selectEmotion('sad',this)">
          <span style="font-size:22px">😢</span>
          <span style="font-size:11px;font-weight:700;color:#A0714F">슬픔/눈물</span>
        </button>
        <button class="e-chip" onclick="selectEmotion('angry',this)">
          <span style="font-size:22px">😤</span>
          <span style="font-size:11px;font-weight:700;color:#A0714F">화남/억울</span>
        </button>
        <button class="e-chip" onclick="selectEmotion('neutral',this)">
          <span style="font-size:22px">😐</span>
          <span style="font-size:11px;font-weight:700;color:#A0714F">무표정</span>
        </button>
        <button class="e-chip" onclick="selectEmotion('love',this)">
          <span style="font-size:22px">🥰</span>
          <span style="font-size:11px;font-weight:700;color:#A0714F">설렘/사랑</span>
        </button>
        <button class="e-chip" onclick="selectEmotion('surprise',this)">
          <span style="font-size:22px">😮</span>
          <span style="font-size:11px;font-weight:700;color:#A0714F">놀람/당황</span>
        </button>
      </div>

      <div style="display:none" id="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="loading-wrap" id="loading-wrap">
          <div class="bouncing">🥔</div>
          <div style="font-size:13px;color:#A0714F;font-weight:700;margin-top:8px">감자로 변신 중이에요...</div>
          <div style="font-size:11px;color:#8B6E5A;margin-top:3px">잠깐만 기다려줘요 🥔</div>
        </div>
      </div>
    </div>

    <!-- STEP 3: 결과 -->
    <div class="card" id="step3" style="display:none">
      <div class="card-title" style="text-align:center;margin-bottom:8px">🥔 감자 완성!</div>
      <div style="text-align:center;margin-bottom:14px">
        <span id="emotion-badge" style="display:inline-flex;align-items:center;gap:6px;background:#FDF6EE;border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;color:#A0714F"></span>
      </div>

      <canvas class="result-canvas" id="result-canvas" width="480" height="480"></canvas>

      <div style="font-size:11px;color:#8B6E5A;text-align:center;margin-bottom:14px;line-height:1.6">
        🥔 감자같은인생 워터마크가 포함돼 있어요<br>
        인스타에 올리고 감자 계정 태그해주세요!
      </div>

      <div style="display:flex;gap:10px">
        <button class="btn-primary" onclick="downloadImage()">💾 저장하기</button>
        <button class="btn-secondary" onclick="resetAll()">🔄 다시</button>
      </div>

      <div class="share-tip">
        📸 인스타에 올리고 <b>#감자변환기 #감자같은인생</b> 태그하면<br>
        감자님이 직접 반응해드려요 🥔
      </div>
    </div>

  </div>
</div>

const tImgs = {};
const emotionData = {
  happy:    { label: '😄 웃음 감자',   key: 'gamja_happy',    bg: '#FFF0E8' },
  excited:  { label: '🙌 만세 감자',   key: 'gamja_excited',  bg: '#FFF0E8' },
  thumbsup: { label: '👍 엄지척 감자', key: 'gamja_thumbsup', bg: '#FFF0E8' },
  tired:    { label: '😪 피곤 감자',   key: 'gamja_tired',    bg: '#F5E6D3' },
  sad:      { label: '😢 눈물 감자',   key: 'gamja_sad',      bg: '#E8EEF5' },
  angry:    { label: '😤 화난 감자',   key: 'gamja_angry',    bg: '#F5E8E8' },
  neutral:  { label: '😐 무표정 감자', key: 'gamja_neutral',  bg: '#F5F0E8' },
  love:     { label: '🥰 설레는 감자', key: 'gamja_love',     bg: '#FFE8EE' },
  surprise: { label: '😮 놀란 감자',   key: 'gamja_surprise', bg: '#FFF8E8' }
};

const keyMap = {
  happy:'gamja_happy', excited:'gamja_excited', thumbsup:'gamja_thumbsup',
  tired:'gamja_tired', sad:'gamja_sad', angry:'gamja_angry',
  neutral:'gamja_neutral', love:'gamja_love', surprise:'gamja_surprise'
};

Object.entries(keyMap).forEach(([type, fileKey]) => {
  const img = new Image();
  img.src = tGamjaB64[fileKey];
  tImgs[type] = img;
});

let selectedType = null;

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('preview-img').src = e.target.result;
    document.getElementById('upload-area').style.display = 'none';
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function retakePhoto() {
  document.getElementById('upload-area').style.display = 'block';
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('file-input').value = '';
}

function goStep2() {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  document.getElementById('dot1').classList.remove('active');
  document.getElementById('dot1').classList.add('done');
  document.getElementById('dot2').classList.add('active');
}

function selectEmotion(type, el) {
  document.querySelectorAll('.e-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedType = type;
  document.getElementById('progress-wrap').style.display = 'block';

  let prog = 0;
  const fill = document.getElementById('progress-fill');
  const interval = setInterval(() => {
    prog += Math.random() * 22 + 8;
    if (prog >= 100) {
      prog = 100;
      clearInterval(interval);
      fill.style.width = '100%';
      setTimeout(() => goStep3(type), 400);
    }
    fill.style.width = prog + '%';
  }, 100);
}

function goStep3(type) {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'block';
  document.getElementById('dot2').classList.remove('active');
  document.getElementById('dot2').classList.add('done');
  document.getElementById('dot3').classList.add('active');

  const data = emotionData[type];
  document.getElementById('emotion-badge').textContent = data.label;

  const canvas = document.getElementById('result-canvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = data.bg;
  ctx.beginPath();
  ctx.roundRect(0, 0, w, h, 40);
  ctx.fill();

  const img = tImgs[type];
  const draw = () => {
    const pad = 60, size = Math.min(w, h) - pad * 2;
    ctx.drawImage(img, (w-size)/2, (h-size)/2 - 20, size, size);
    ctx.fillStyle = 'rgba(160,113,79,0.85)';
    ctx.font = 'bold 22px GmarketSans, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🥔 감자같은인생', w/2, h - 18);
    ctx.textAlign = 'left';
  };
  if (img.complete && img.naturalWidth > 0) draw();
  else img.onload = draw;

  document.getElementById('step3').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function downloadImage() {
  const canvas = document.getElementById('result-canvas');
  const link = document.createElement('a');
  link.download = '오늘부터나는감자_' + (emotionData[selectedType]?.label || '감자') + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function resetAll() {
  selectedType = null;
  ['step1','step2','step3'].forEach(s => document.getElementById(s).style.display = 'none');
  document.getElementById('step1').style.display = 'block';
  document.getElementById('upload-area').style.display = 'block';
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('file-input').value = '';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('progress-fill').style.width = '0%';
  document.querySelectorAll('.e-chip').forEach(c => c.classList.remove('selected'));
  ['dot1','dot2','dot3'].forEach(d => {
    document.getElementById(d).classList.remove('active','done');
  });
  document.getElementById('dot1').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
